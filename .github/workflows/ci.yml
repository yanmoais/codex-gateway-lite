name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Cargo test
        run: cargo test

      - name: CLI help smoke test
        run: cargo run --quiet -- --help
